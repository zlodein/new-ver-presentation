# Полный фрагмент для FastPanel2 (API + SPA history mode) хранится в репозитории:
#   deploy/nginx-fastpanel-e-presentation.ru.includes
# При деплое через GitHub Actions или scripts/deploy.sh файл копируется на сервер в:
#   /etc/nginx/fastpanel2-sites/e_presentati_usr/e-presentation.ru.includes
# Ручная вставка (если без автодеплоя): скопируйте содержимое того файла в includes сайта.

    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }
