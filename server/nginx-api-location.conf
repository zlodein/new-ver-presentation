# FastPanel2: в репозитории два слоя (см. scripts/apply-nginx-spa-on-server.sh):
#   deploy/nginx-fastpanel-e-presentation.ru.includes — только proxy /api (во второй location / в includes nginx ругается).
#   В основном *.conf сайта в fastpanel2-sites/... скрипт добавляет try_files $uri $uri/ /index.html в существующий location /.
# Ручная настройка: не дублируйте location / во includes.

    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }
